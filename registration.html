<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FlashDrive Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1477959858617-67f85cf4f1df') no-repeat center center fixed;
            background-size: cover;
        }

    
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        .registration-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
            padding-bottom: 80px; 
            min-height: 100%;
        }

        .registration-card {
            background: rgba(0, 120, 68, 0.921); 
            padding: 30px;
            border-radius: 15px;
            width: 450px;
            color: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        .registration-card h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        .registration-card input[type="text"],
        .registration-card input[type="email"],
        .registration-card input[type="password"],
        .registration-card input[type="date"],
        .registration-card input[type="tel"],
        .registration-card input[type="file"] {
            width: 100%;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        .registration-card label {
            font-weight: bold;
        }

        .avatar-upload {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .avatar-upload img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #fff;
        }

        footer {
            text-align: center;
            color: #fff;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        .row .col input {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <a class="navbar-brand" href="index.html">🛵 FlashDrive</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
            <li class="nav-item">
                <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="fare-matrix.html">Fare Matrix</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="schedule.html">Schedule</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="help.html">Help</a>
            </li>
        </ul>
    </div>
  </div>
</nav>

<div class="registration-container">
    <div class="registration-card">
        <h2>REGISTRATION</h2>

        <div class="avatar-upload">
            <img id="avatarPreview" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" alt="Avatar">
        </div>
        <input type="file" accept="image/*" onchange="previewAvatar(event)">

        <form action="confirmation.html">
            <div class="row">
                <div class="col">
                    <label>First Name</label>
                    <input type="text" class="form-control" placeholder="John" required>
                </div>
                <div class="col">
                    <label>Last Name</label>
                    <input type="text" class="form-control" placeholder="Doe" required>
                </div>
            </div>

            <div class="mb-3">
                <label>Date of Birth</label>
                <input type="date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Contact Number</label>
                <input type="tel" class="form-control" placeholder="09XXXXXXXXX" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" class="form-control" placeholder="example@gmail.com" required>
            </div>

            <div class="mb-3">
                <label>Username</label>
                <input type="text" class="form-control" placeholder="Enter username" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" class="form-control" placeholder="Enter password" required>
            </div>

            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label" for="terms">
                    I agree to the <a href="terms.html" target="_blank" style="color: #fff; text-decoration: underline;">terms and conditions</a>.
                </label>
            </div>

            <button type="submit" class="btn btn-primary w-100">Register</button>
        </form>
    </div>
</div>

<footer>
    Group Members: Cruz, Pogoy, Dela Fuente | Grade 9 - Sapphire
</footer>

<script>
    function previewAvatar(event) {
        const reader = new FileReader();
        reader.onload = function(){
            document.getElementById('avatarPreview').src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
